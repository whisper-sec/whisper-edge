name: Publish to npm
# Tag-triggered: push a v* tag (e.g. v0.1.1) to build, test, and publish to npm.
#   git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  id-token: write # for npm --provenance
jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test
      # Publishes when the NPM_TOKEN secret is set. --provenance signs the build; the tag
      # must match the package.json version (npm publish enforces the version).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
